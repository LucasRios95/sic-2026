services:
  postgres:
    image: postgres:16-alpine
    container_name: sic_2026_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: ${DB_NAME:-sic_2026}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - sic_2026_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-sic_2026}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sic_2026_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - sic_2026_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  sic_2026_postgres_data:
  sic_2026_redis_data:
