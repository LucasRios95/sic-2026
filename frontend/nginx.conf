# DNS embedded do Docker. Sem isso, nginx faz lookup do upstream UMA VEZ no boot
# e cacheia o IP -- se o container `backend` for restartado (ganha IP novo), nginx
# continua mandando pra IP morto e retorna 502 ate ele proprio ser reiniciado.
# valid=10s = re-resolve a cada 10s no maximo.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressao para reduzir banda; assets ja sao minificados pelo Vite.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    client_max_body_size 25M;  # upload de PFX (pode chegar a alguns MB)

    # SPA fallback -- TanStack Router faz client-side routing; qualquer 404 cai no index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets versionados pelo Vite (hash no nome do arquivo): cache agressivo seguro.
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Proxy reverso para o backend interno. Usamos VARIAVEL em proxy_pass para forcar
    # nginx a re-resolver o DNS via o resolver acima (em vez de cachear o IP no boot)
    # -- evita 502 apos `docker compose restart backend`. O rewrite remove o /api
    # antes de mandar para o Express (que ouve em /auth, /nfe, /customers...).
    location /api/ {
        set $upstream_backend backend:3333;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }

    # Health check do proprio Nginx (nao passa pelo backend).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
